version: "3"

vars:
  VENV: .venv
  PYTHON: python
  PIP: "pip"
  UVICORN: "uvicorn"

tasks:
  venv:
    cmds:
      - "{{.PYTHON}} -m venv {{.VENV}}"

  install:
    deps: [venv]
    cmds:
      - "{{.PIP}} install -r requirements.txt"

  run:
    cmds:
      - "{{.UVICORN}} app.main:app --reload"

  dataset:
    cmds:
      - "{{.PYTHON}} scripts/build_dataset.py --per-class 50"

  evaluate:
    cmds:
      - "{{.PYTHON}} scripts/evaluate.py --input datasets/attacks.csv --output datasets/results.csv"

  metrics:
    cmds:
      - "{{.PYTHON}} scripts/metrics.py --results datasets/results.csv"

  report:
    cmds:
      - "{{.PYTHON}} scripts/report.py --results datasets/results.csv"

  test-redis:
    env:
      REDIS_URL: redis://localhost:6379/0
    cmds:
      - docker compose up -d redis
      - "{{.PYTHON}} -m pytest -q -rs"

  test-redis-ps:
    env:
      REDIS_URL: redis://localhost:6379/0
    cmds:
      - docker compose up -d redis
      - "{{.PYTHON}} -m pytest -q -rs"
      - docker compose stop redis

  docker-up:
    env:
      REDIS_URL: redis://redis:6379/0
    cmds:
      - docker compose up --build

  docker-down:
    cmds:
      - docker compose down

  all:
    cmds:
      - task: dataset
      - task: evaluate
      - task: metrics
