version: "3"

vars:
  VENV: .venv
  PYTHON: python
  PIP: "pip"
  UVICORN: "uvicorn"

tasks:
  venv:
    cmds:
      - "{{.PYTHON}} -m venv {{.VENV}}"

  install:
    deps: [venv]
    cmds:
      - "{{.PIP}} install -r requirements.txt"

  run:
    cmds:
      - "{{.UVICORN}} app.main:app --reload"

  dataset:
    cmds:
      - "{{.PYTHON}} scripts/build_dataset.py --per-class 50"

  evaluate:
    cmds:
      - "{{.PYTHON}} scripts/evaluate.py --input datasets/attacks.csv --output datasets/results.csv"

  metrics:
    cmds:
      - "{{.PYTHON}} scripts/metrics.py --results datasets/results.csv"

  report:
    cmds:
      - "{{.PYTHON}} scripts/report.py --results datasets/results.csv"

  monitor-dashboard:
    cmds:
      - echo Open http://127.0.0.1:8000/api/v1/monitoring

  monitor-summary:
    cmds:
      - "{{.PYTHON}} -c \"import json, urllib.request; print(json.dumps(json.load(urllib.request.urlopen('http://127.0.0.1:8000/api/v1/monitoring/summary')), indent=2))\""

  docker-up:
    env:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://app:app@postgres:5432/ai_security
    cmds:
      - docker compose up --build

  docker-down:
    cmds:
      - docker compose down

  db-init:
    env:
      POSTGRES_DSN: postgresql://app:app@localhost:5432/ai_security
    cmds:
      - "{{.PYTHON}} -c \"from app.storage.audit_store import init_audit_store; init_audit_store()\""

  all:
    cmds:
      - task: dataset
      - task: evaluate
      - task: metrics
